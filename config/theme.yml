name: afox_child
display_name: "AFOX Custom Theme"
version: 1.0.0
parent: hummingbird
author:
  name: "AFOX Team"
  email: "dev@afox.su"
meta:
  compatibility:
    from: 9.0.0
    to: ~9.1.0
  framework: bootstrap-v5.3.3
  available_layouts:
    layout-full-width:
      name: "Full Width"
      description: "No side columns, ideal for product pages"
    layout-both-columns:
      name: "Two Columns"
      description: "Left and right side columns"
    layout-left-column:
      name: "Left Column"
      description: "Small left sidebar"
    layout-right-column:
      name: "Right Column"
      description: "Small right sidebar"

global_settings:
  default_layout: layout-full-width
  configuration:
    PS_IMAGE_QUALITY: webp
  image_types:
    cart_default:
      width: 80
      height: 80
      crop: true
      format: 'default'
    small_default:
      width: 98
      height: 98
      crop: true
      format: 'default'
    medium_default:
      width: 452
      height: 452
      crop: true
      format: 'default'
    large_default:
      width: 800
      height: 800
      crop: true
      format: 'default'
    home_default:
      width: 500
      height: 500
      crop: true
      format: 'default'
    category_default:
      width: 300
      height: 300
      crop: true
      format: 'default'
    store_default:
      width: 200
      height: 200
      crop: true
      format: 'default'
    manufacturer_default:
      width: 200
      height: 200
      crop: false
      format: 'default'
    supplier_default:
      width: 200
      height: 200
      crop: false
      format: 'default'
    product_default:
      width: 1000
      height: 1000
      crop: false
      format: 'default'

modules:
  to_enable:
    - ps_mainmenu
    - ps_searchbar
    - ps_contactinfo
    - ps_linklist
    - ps_customeraccountlinks
    - ps_currencyselector
    - ps_languageselector
    - ps_shoppingcart
  to_disable:
    - ps_socialfollow
    - ps_brandlist
    - ps_supplierlist

hooks:
  modules_to_unhook:
    displayHome:
      - ps_banner
      - ps_imageslider
